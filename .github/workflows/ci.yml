name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      # Build-time placeholders. The Supabase client is only called at request
      # time, so these are never used during `next build`.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
